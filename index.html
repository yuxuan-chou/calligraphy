<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聖教序字帖搜尋</title>
  <!-- Tailwind CSS via Vite -->
  <link rel="stylesheet" href="/src/style.css">
  
  <!-- Icons via CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- OpenCC for traditional/simplified conversion -->
  <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"></script>
</head>
<body class="min-h-screen bg-[#f7f5f0] text-[#2c2c2c] font-serif selection:bg-[#8b2626] selection:text-white">
  
  <div class="max-w-7xl mx-auto px-6 py-12 md:py-20">
    <header class="flex flex-col items-center mb-16 space-y-6">
      <div class="w-16 h-16 rounded-full border-2 border-[#8b2626] flex items-center justify-center bg-white shadow-sm" id="header-circle">
        <span class="text-2xl font-bold text-[#8b2626]" style="font-family: 'Kaiti', serif;">聖</span>
      </div>
      <h1 class="text-4xl md:text-5xl font-medium tracking-widest text-[#2c2c2c]">書聖王羲之</h1>
      <p class="text-lg text-gray-600 tracking-wider">集字聖教序 • 行書字典</p>
      
      <nav class="flex gap-8 text-sm uppercase tracking-[0.2em] font-medium opacity-70">
        <a href="#" class="hover:text-[#8b2626] transition-colors border-b border-[#8b2626] pb-1">字帖查詢</a>
      </nav>
    </header>

    <main class="max-w-3xl mx-auto">
      <form id="search-form" class="relative group">
        <div class="absolute inset-y-0 left-6 flex items-center pointer-events-none text-gray-400 group-focus-within:text-[#8b2626] transition-colors">
          <i data-lucide="search" class="w-6 h-6"></i>
        </div>
        <input 
          type="text" 
          id="search-input"
          placeholder="輸入漢字，例如：天地玄黃..."
          class="w-full bg-white border border-gray-200 rounded-full py-5 pl-16 pr-16 text-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-[#8b2626]/20 focus:border-[#8b2626] transition-all placeholder:text-gray-300"
        >
        <button type="button" id="clear-btn" class="absolute inset-y-0 right-6 flex items-center text-gray-300 hover:text-gray-600 hidden">
          <i data-lucide="x-circle" class="w-6 h-6"></i>
        </button>
      </form>

      <div id="results-container" class="mt-12">
        <div id="initial-state" class="text-center text-gray-400 py-12 opacity-60">
          <i data-lucide="pen-tool" class="w-12 h-12 mx-auto mb-4 opacity-50"></i>
          <p class="text-lg tracking-widest">在上方輸入文字開始查詢</p>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
