        // --- 碑帖拓片模擬產生器 ---
        window.generateCalligraphyImage = function (char) {
            const canvas = document.createElement('canvas');
            // 使用高解析度以獲得更好的視覺體驗
            canvas.width = 600;
            canvas.height = 800;
            const ctx = canvas.getContext('2d');

            // 1. 繪製黑底 (模擬墨拓)
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. 添加石刻斑駁紋理 (Noise)
            for (let i = 0; i < 8000; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const size = Math.random() * 2;
                // 混雜白色與深黑色雜點
                ctx.fillStyle = Math.random() > 0.3 ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.8)';
                ctx.fillRect(x, y, size, size);
            }

            // 3. 繪製宣紙邊緣泛黃/反光感 (模擬拓紙)
            const gradient = ctx.createRadialGradient(300, 400, 100, 300, 400, 600);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0.4)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 4. 繪製書法文字 (白字)
            ctx.fillStyle = '#e8e6e1'; // 偏暖的紙白色
            ctx.font = 'bold 360px "Noto Serif TC", serif'; // 使用粗明體模擬書法筆畫
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // 添加字體陰影，模擬石刻凹陷立體感
            ctx.shadowColor = 'rgba(0, 0, 0, 1)';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;

            // 微調文字位置置中
            ctx.fillText(char, canvas.width / 2, canvas.height / 2 + 30);

            // 回傳 Base64 圖片編碼
            return canvas.toDataURL('image/jpeg', 0.9);
        };

        // --- 圖片載入失敗的救援機制 ---
        window.handleImageError = function (imgElement, char) {
            imgElement.onerror = null; // 防止無限迴圈
            imgElement.src = window.generateCalligraphyImage(char);

            // 同步更新下載連結
            const group = imgElement.closest('.group');
            if (group && group.nextElementSibling) {
                const downloadLink = group.nextElementSibling.querySelector('a');
                if (downloadLink) {
                    downloadLink.href = imgElement.src;
                }
            }
        };

            const lightboxCaption = document.getElementById('lightboxCaption');

            lightboxImg.src = imgSrc;
            lightboxCaption.textContent = `《集字聖教序》 — ${char}`;
            lightbox.classList.remove('hidden');
            lightbox.classList.remove('fade-out');
            lightbox.classList.add('flex', 'fade-in');
            document.body.style.overflow = 'hidden'; // 禁止背景滾動
        };

        window.closeLightbox = function () {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('fade-in');
            lightbox.classList.add('fade-out');
            setTimeout(() => {
                lightbox.classList.add('hidden');
                lightbox.classList.remove('flex');
                document.body.style.overflow = ''; // 恢復背景滾動

            // --- 渲染卡片結果 ---
            function renderResults(query) {
                // 將字串拆分為單字陣列，去重複
                const chars = [...new Set(query.split(''))];

                statusMessage.classList.add('hidden');
                cardsGrid.innerHTML = '';

                // 檢查是否「所有的字」都不在資料庫中
                const hasAnyResult = chars.some(char => imageDatabase[char]);

                if (!hasAnyResult) {
                    // 顯示全域無結果狀態
                    const emptyState = document.createElement('div');
                    emptyState.className = "col-span-1 sm:col-span-2 lg:col-span-3 flex flex-col items-center justify-center py-16 opacity-0";
                    emptyState.style.animation = `fadeInUp 0.6s ease forwards`;
                    emptyState.innerHTML = `
                        <div class="w-16 h-16 border-2 border-seal text-seal flex items-center justify-center rounded-sm text-3xl font-serif mb-6 transform rotate-12 opacity-50">空</div>
                        <h3 class="text-2xl font-serif text-ink tracking-widest mb-3">無符合條件的結果</h3>
                        <p class="text-gray-500 tracking-wider font-light">字帖資料庫中尚未收錄您查詢的漢字。</p>
                    `;
                    cardsGrid.appendChild(emptyState);
                    return;
                }

                let delayIndex = 0; // 用於計算所有卡片的進場動畫延遲

                chars.forEach((char) => {
                    // 1. 判斷資料庫中是否有該字
                    if (imageDatabase[char]) {
                        let imageUrls = [];
                        // 2. 判斷是陣列(多圖)還是單一字串
                        if (Array.isArray(imageDatabase[char])) {
                            imageUrls = imageDatabase[char];
                        } else {
                            imageUrls = [imageDatabase[char]];
                        }

                        // 3. 為這個字的所有寫法(圖片)逐一生成卡片
                        imageUrls.forEach((imageUrl, variantIndex) => {
                            // 建立卡片 DOM
                            const card = document.createElement('div');
                            card.className = `bg-[#fbfbf9] p-4 pb-5 rounded-sm shadow-sm border border-gray-200 hover:shadow-xl transition-all duration-500 opacity-0 transform translate-y-4`;
                            card.style.animation = `fadeInUp 0.6s ease forwards ${delayIndex * 0.15}s`;

                            const downloadFileName = imageUrls.length > 1 ? `聖教序_${char}_寫法${variantIndex + 1}.jpg` : `聖教序_${char}.jpg`;
                            const variantLabel = imageUrls.length > 1 ? `<span class="text-xs text-gray-400 ml-2 font-sans">(寫法 ${variantIndex + 1})</span>` : '';

                            card.innerHTML = `
                                <!-- 圖片容器 -->
                                <div class="aspect-[3/4] w-full bg-transparent relative overflow-hidden rounded-sm cursor-zoom-in group flex items-center justify-center" onclick="window.openLightbox(this.querySelector('img').src, '${char}')">
                                    <!-- 改用獨立的全域錯誤處理函式，確保不會因為作用域問題找不到 function -->
                                    <img src="${imageUrl}" alt="${char}" 
                                         onerror="window.handleImageError(this, '${char}')" 
                                         class="w-full h-full object-contain group-hover:scale-105 transition-transform duration-700">
                                    <div class="absolute inset-0 bg-black/0 group-hover:bg-black/20 flex items-center justify-center transition-colors duration-500">
                                        <span class="text-white opacity-0 group-hover:opacity-100 font-sans tracking-widest text-sm border border-white px-3 py-1 rounded-full">放大檢視</span>
                                    </div>
                                </div>
                                
                                <!-- 底部資訊與按鈕 -->
                                <div class="mt-5 flex justify-between items-end px-1">
                                    <div class="flex flex-col">
                                        <span class="text-xs text-gray-400 font-sans tracking-wider mb-1">集字聖教序</span>
                                        <h3 class="font-serif text-3xl text-ink flex items-baseline">${char} ${variantLabel}</h3>
                                    </div>
                                    <a href="${imageUrl}" download="${downloadFileName}" class="text-xs text-seal border border-seal px-3 py-1.5 rounded-sm hover:bg-seal hover:text-paper transition-colors flex items-center gap-1">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                                        下載
                                    </a>
                                </div>
                            `;
                            cardsGrid.appendChild(card);
                            delayIndex++;
                        });
                    }
                });
            }
        });
    </script>

    <!-- 卡片進場動畫定義 -->
    <style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</body>

</html>
